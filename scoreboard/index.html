<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mushketon — Scoreboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      padding: 48px 32px;
    }

    h1 {
      text-align: center;
      font-size: 2.4rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    #comp-date {
      text-align: center;
      color: #555;
      font-size: 0.9rem;
      letter-spacing: 2px;
      margin-bottom: 32px;
    }

    /* ── Таймер (scoreboard) ───────────────────────────── */
    #sb-timer {
      display: none; /* показываем только когда таймер активен или остановлен с остатком */
      max-width: 720px;
      margin: 0 auto 40px;
      text-align: center;
    }
    #sb-timer-display {
      font-size: 5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 4px;
      color: #FFD700;
      line-height: 1;
      margin-bottom: 16px;
    }
    #sb-timer-display.finished { color: #e74c3c; }
    #sb-timer-bar-wrap {
      height: 5px;
      background: #1a1a1a;
      border-radius: 3px;
      overflow: hidden;
    }
    #sb-timer-bar {
      height: 100%;
      background: #FFD700;
      border-radius: 3px;
      transition: width 0.9s linear;
      width: 100%;
    }
    #sb-timer-bar.finishing { background: #e74c3c; }

    table {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      border-collapse: collapse;
    }

    thead th {
      color: #444;
      text-align: left;
      padding: 8px 20px;
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-bottom: 1px solid #1a1a1a;
    }

    thead th.right { text-align: right; }

    tbody tr {
      border-bottom: 1px solid #0d0d0d;
      transition: color 0.4s ease;
    }

    tbody td {
      padding: 16px 20px;
      font-size: 1.3rem;
    }

    td.place {
      color: #333;
      width: 50px;
      font-size: 1rem;
    }

    td.total {
      text-align: right;
      font-weight: bold;
      width: 100px;
    }

    tr.leader { color: #FFD700; }
    tr.leader td.place { color: #a08800; }

    .empty {
      text-align: center;
      color: #2a2a2a;
      padding: 80px 0;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }

    #dot {
      position: fixed;
      bottom: 18px;
      right: 22px;
      font-size: 0.7rem;
      color: #1a1a1a;
      letter-spacing: 1px;
    }
    #dot.live  { color: #1a3a1a; }
    #dot.error { color: #3a1a1a; }
  </style>
</head>
<body>

  <h1>Mushketon</h1>
  <div id="comp-date">—</div>

  <!-- Таймер -->
  <div id="sb-timer">
    <div id="sb-timer-display">0:00</div>
    <div id="sb-timer-bar-wrap"><div id="sb-timer-bar"></div></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th id="th-ranking-name">Пара</th>
        <th class="right">Итого</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="3" class="empty">ОЖИДАНИЕ ДАННЫХ</td></tr>
    </tbody>
  </table>

  <div id="dot">●</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="../config.js"></script>
  <script>
    // ─── Конфиг ───────────────────────────────────────────────
    const SUPABASE_URL      = window.MUSHKETON_CONFIG.SUPABASE_URL;
    const SUPABASE_ANON_KEY = window.MUSHKETON_CONFIG.SUPABASE_ANON_KEY;
    // ──────────────────────────────────────────────────────────

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let localShooters = [];
    let currentCompId = null;
    let currentCompType = 'pairs';
    let shootersChannel = null;
    let reconnectTimer = null;

    function seriesCountFor(type) { return type === 'final' ? 9 : 6; }

    function sumSeries(shooter, count) {
      let sum = 0, any = false;
      for (let i = 1; i <= count; i++) {
        const v = shooter['s' + i];
        if (v != null) { sum += parseFloat(v); any = true; }
      }
      return any ? Math.round(sum * 10) / 10 : null;
    }

    // ── Подсчёт рейтинга ────────────────────────────────────────
    // Пары (тип 'pairs'): щит 1+2, щит 3+4, щит 5+6 и т.д. (до 10 пар = 20 щитов)
    // Финал (тип 'final'): 1 стрелок = 1 строка, без группировки
    function buildRanking(shooters, type) {
      const count = seriesCountFor(type);

      if (type === 'final') {
        return shooters
          .map(s => ({
            names: s.name,
            total: sumSeries(s, count) ?? 0
          }))
          .sort((a, b) => b.total - a.total);
      }

      const byPair = {};
      for (const s of shooters) {
        const pairIdx = Math.floor((s.target - 1) / 2);
        if (!byPair[pairIdx]) byPair[pairIdx] = [];
        byPair[pairIdx].push(s);
      }
      return Object.entries(byPair)
        .map(([pairIdx, members]) => {
          members.sort((a, b) => a.target - b.target);
          const memberSums = members.map(m => sumSeries(m, count));
          const total = memberSums.reduce((a, v) => a + (v ?? 0), 0);
          const names = members
            .map((m, i) => memberSums[i] != null ? `${m.name} (${memberSums[i].toFixed(1)})` : m.name)
            .join(' / ');
          return {
            pairIdx: +pairIdx,
            names,
            total: Math.round(total * 10) / 10
          };
        })
        .sort((a, b) => b.total - a.total);
    }

    // ── Рендер ────────────────────────────────────────────────
    function render() {
      const pairs = buildRanking(localShooters, currentCompType);
      const tbody = document.getElementById('tbody');

      if (pairs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty">ОЖИДАНИЕ ДАННЫХ</td></tr>';
        return;
      }

      tbody.innerHTML = pairs.map((p, i) => `
        <tr class="${i === 0 ? 'leader' : ''}">
          <td class="place">${i + 1}</td>
          <td class="pair">${esc(p.names)}</td>
          <td class="total">${p.total > 0 ? p.total.toFixed(1) : '—'}</td>
        </tr>
      `).join('');
    }

    function esc(str) {
      return str.replace(/[&<>"']/g, c =>
        ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    // ── Загрузка данных ───────────────────────────────────────
    async function load() {
      const { data: comps } = await db
        .from('competitions')
        .select('*')
        .eq('is_active', true)
        .order('date', { ascending: false })
        .limit(1);

      if (!comps?.length) return;
      const comp = comps[0];
      currentCompId   = comp.id;
      currentCompType = comp.type || 'pairs';

      const th = document.getElementById('th-ranking-name');
      if (th) th.textContent = currentCompType === 'final' ? 'Имя' : 'Пара';

      document.getElementById('comp-date').textContent =
        new Date(comp.date + 'T00:00:00').toLocaleDateString('ru-RU',
          { day: 'numeric', month: 'long', year: 'numeric' });

      await refreshShooters();
      applyTimerState(comp);  // показать таймер сразу при загрузке
      subscribe(comp.id);
    }

    // Перечитать всех стрелков текущего соревнования (фолбэк после реконнекта)
    async function refreshShooters() {
      if (!currentCompId) return;
      const { data: shooters, error } = await db
        .from('shooters')
        .select('*')
        .eq('competition_id', currentCompId);
      if (!error) {
        localShooters = shooters || [];
        render();
      }
    }

    // ── Realtime подписка + авто-реконнект ────────────────────
    function subscribe(compId) {
      const dot = document.getElementById('dot');

      // Пересоздаём канал при повторном вызове
      if (shootersChannel) { db.removeChannel(shootersChannel); shootersChannel = null; }

      shootersChannel = db.channel('scoreboard-' + Date.now())
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'shooters',
          filter: `competition_id=eq.${compId}`
        }, ({ eventType, new: n, old: o }) => {
          if (eventType === 'INSERT') {
            localShooters.push(n);
          } else if (eventType === 'UPDATE') {
            const i = localShooters.findIndex(s => s.id === n.id);
            if (i !== -1) localShooters[i] = n; else localShooters.push(n);
          } else if (eventType === 'DELETE') {
            localShooters = localShooters.filter(s => s.id !== o.id);
          }
          render();
        })
        .subscribe(status => {
          if (status === 'SUBSCRIBED') {
            dot.textContent = '● live';
            dot.className   = 'live';
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            // После (пере)подключения подтягиваем актуальные данные —
            // на случай изменений, пропущенных во время обрыва
            refreshShooters();
          } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
            dot.textContent = '● connecting';
            dot.className   = 'error';
            scheduleReconnect(compId);
          } else {
            dot.textContent = '● connecting';
            dot.className   = '';
          }
        });

      // Новое соревнование (INSERT) — перезагрузить страницу.
      // Изменение соревнования (UPDATE) — обновить таймер.
      db.channel('sb-competitions')
        .on('postgres_changes', {
          event: 'INSERT', schema: 'public', table: 'competitions'
        }, () => location.reload())
        .on('postgres_changes', {
          event: 'UPDATE',
          schema: 'public',
          table: 'competitions',
          filter: `id=eq.${compId}`
        }, ({ new: updated }) => {
          applyTimerState(updated);
        })
        .subscribe();
    }

    // ── Таймер (scoreboard) ──────────────────────────────────
    let sbTimerTick = null;

    function applyTimerState(comp) {
      stopSbTimerTick();
      const block = document.getElementById('sb-timer');
      if (!comp.timer_active || !comp.timer_started_at || !comp.timer_duration) {
        block.style.display = 'none';
        return;
      }
      block.style.display = 'block';
      startSbTimerTick(new Date(comp.timer_started_at), comp.timer_duration);
    }

    function startSbTimerTick(startedAt, duration) {
      function tick() {
        const elapsed   = (Date.now() - startedAt) / 1000;
        const remaining = Math.max(0, duration - elapsed);
        renderSbTimer(remaining, duration);
        if (remaining <= 0) stopSbTimerTick();
      }
      tick();
      sbTimerTick = setInterval(tick, 500);
    }

    function stopSbTimerTick() {
      if (sbTimerTick) { clearInterval(sbTimerTick); sbTimerTick = null; }
    }

    function renderSbTimer(remaining, duration) {
      const disp = document.getElementById('sb-timer-display');
      const bar  = document.getElementById('sb-timer-bar');
      const secs = Math.ceil(remaining);
      const m    = Math.floor(secs / 60);
      const s    = secs % 60;
      disp.textContent = m + ':' + String(s).padStart(2, '0');
      const pct  = duration > 0 ? (remaining / duration) * 100 : 0;
      bar.style.width  = pct.toFixed(1) + '%';
      const done = remaining <= 0;
      disp.className   = done ? 'finished' : '';
      bar.className    = (pct < 20 || done) ? 'finishing' : '';
    }

    // Повторное подключение с задержкой (без спама)
    function scheduleReconnect(compId) {
      if (reconnectTimer) return;
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        subscribe(compId);
      }, 3000);
    }

    // Реконнект при возврате вкладки / восстановлении сети
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && currentCompId) { refreshShooters(); subscribe(currentCompId); }
    });
    window.addEventListener('online', () => {
      if (currentCompId) { refreshShooters(); subscribe(currentCompId); }
    });

    // ── Полноэкранный режим ───────────────────────────────────
    // Двойной клик по странице или клавиша F — вкл/выкл fullscreen
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
      } else {
        document.exitFullscreen?.();
      }
    }
    document.addEventListener('dblclick', toggleFullscreen);
    document.addEventListener('keydown', e => {
      if (e.key === 'f' || e.key === 'F' || e.key === 'а' || e.key === 'А') toggleFullscreen();
    });

    load();
  </script>
</body>
</html>
