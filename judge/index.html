<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musketoon — Судья</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: #f4f4f4;
      color: #111;
      min-height: 100vh;
    }

    header {
      background: #111;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    header h1 { font-size: 1.1rem; letter-spacing: 2px; }
    header .meta { font-size: 0.8rem; color: #666; flex: 1; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .btn-primary { background: #FFD700; color: #111; }
    .btn-ghost   { background: transparent; color: #aaa; border: 1px solid #555; }

    #blocked {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 80vh; gap: 12px; color: #888;
    }
    #blocked h2 { font-size: 1.2rem; }

    /* ── Модал ── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding-top: 40px;
    }
    #modal-overlay.visible { display: flex; }

    #modal {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      width: 360px;
      max-width: 95vw;
      max-height: 85vh;
      overflow-y: auto;
    }
    #modal h2 { margin-bottom: 16px; font-size: 1.05rem; }

    #type-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .type-tab {
      flex: 1;
      background: #f0f0f0;
      color: #666;
      padding: 8px 10px;
      font-size: 0.82rem;
      border-radius: 6px;
    }
    .type-tab.active { background: #111; color: #FFD700; }

    #setup-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }
    #setup-table th {
      text-align: left;
      color: #999;
      font-weight: 500;
      padding: 4px 8px 8px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #setup-table td { padding: 2px 4px; }
    #setup-table .target-cell {
      text-align: center;
      color: #bbb;
      font-size: 0.82rem;
      width: 50px;
      padding: 6px 4px;
    }
    #setup-table input[type="text"] {
      width: 100%;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 7px 10px;
      font-size: 0.9rem;
      outline: none;
    }
    #setup-table input[type="text"]:focus { border-color: #FFD700; }
    #setup-table tr.sep td {
      height: 8px;
      background: #f5f5f5;
      padding: 0;
    }

    .modal-actions {
      display: flex; gap: 10px; justify-content: flex-end;
    }

    /* ── Основное ── */
    #main { padding: 24px; }

    #error-box {
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      border-radius: 8px;
      padding: 16px 20px;
      color: #c0392b;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }

    #loading {
      text-align: center; padding: 60px 0;
      color: #aaa; font-size: 0.9rem;
      display: none;
    }

    #no-competition {
      text-align: center; padding: 80px 0; color: #aaa;
    }
    #no-competition p { margin-bottom: 20px; }

    /* ── Таблица результатов ── */
    #scoring-wrap { overflow-x: auto; }

    #scoring-table {
      border-collapse: collapse;
      font-size: 0.9rem;
      min-width: 560px;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    #scoring-table th {
      background: #111;
      color: #aaa;
      padding: 10px 14px;
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 1px;
    }
    #scoring-table th.left { text-align: left; }
    #scoring-table td { padding: 0; border-bottom: 1px solid #f0f0f0; }

    .td-target {
      text-align: center; width: 52px;
      color: #888; font-size: 0.85rem;
      background: #fafafa;
    }
    .td-target span { display: block; padding: 11px 0; }
    .td-name { background: #fafafa; }
    .td-name span { display: block; padding: 11px 14px; font-weight: 500; }
    .td-total {
      text-align: center; width: 70px;
      font-weight: 700; background: #f6f6f6;
    }
    .td-total span { display: block; padding: 11px 0; }

    .cell-series input {
      width: 72px; border: none;
      text-align: center; padding: 11px 6px;
      font-size: 0.95rem; outline: none;
      background: transparent; color: #111;
    }
    .cell-series input:focus {
      background: #fffbe6;
      outline: 2px solid #FFD700;
      outline-offset: -2px;
      border-radius: 3px;
    }
    .cell-series input.unsaved { color: #e67e22; }

    tr.pair-sep td { height: 6px; background: #ececec; padding: 0; }

    #save-status {
      text-align: right; font-size: 0.78rem;
      color: #aaa; margin-top: 8px;
    }
    #save-status.saving { color: #e67e22; }
    #save-status.ok     { color: #27ae60; }
    #save-status.error  { color: #c0392b; }

    /* ── Таймер (страница судьи) ────────────────────────────── */
    #timer-block {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 20px 24px;
      margin-bottom: 24px;
      display: none; /* показываем когда есть активное соревнование */
    }
    #timer-block .timer-label {
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 14px;
    }
    #timer-block .timer-btns {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .btn-timer {
      background: #f0f0f0;
      color: #111;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-timer:hover { background: #e0e0e0; }
    .btn-timer.active { background: #111; color: #FFD700; }
    .btn-timer-stop {
      background: transparent;
      color: #aaa;
      border: 1px solid #ddd;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-timer-stop:hover { background: #fff0f0; color: #c0392b; border-color: #f5c6c6; }
    #timer-display {
      font-size: 3rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      color: #111;
      line-height: 1;
      margin-bottom: 12px;
    }
    #timer-display.finished { color: #c0392b; }
    #timer-bar-wrap {
      height: 6px;
      background: #f0f0f0;
      border-radius: 3px;
      overflow: hidden;
    }
    #timer-bar {
      height: 100%;
      background: #FFD700;
      border-radius: 3px;
      transition: width 0.9s linear;
      width: 100%;
    }
    #timer-bar.finishing { background: #e74c3c; }
  </style>
</head>
<body>

<header>
  <h1>MUSKETOON · СУДЬЯ</h1>
  <div class="meta" id="comp-info"></div>
  <button class="btn-primary" id="btn-new" style="display:none">+ Новое соревнование</button>
</header>



<!-- Модал: список участников -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Участники соревнования</h2>
    <div id="type-tabs">
      <button class="type-tab" id="tab-pairs" data-type="pairs">Пары</button>
      <button class="type-tab active" id="tab-final" data-type="final">Индивидуальный финал</button>
    </div>
    <table id="setup-table">
      <thead>
        <tr>
          <th style="width:50px">Щит</th>
          <th>Фамилия</th>
        </tr>
      </thead>
      <tbody id="setup-body"></tbody>
    </table>
    <div class="modal-actions">
      <button class="btn-ghost" id="btn-cancel-setup">Отмена</button>
      <button class="btn-primary" id="btn-start">Старт →</button>
    </div>
  </div>
</div>

<div id="main">
  <div id="error-box"></div>
  <div id="loading">Подключение...</div>

  <div id="no-competition" style="display:none">
    <p>Нет активного соревнования</p>
    <button class="btn-primary" id="btn-new2">+ Начать соревнование</button>
  </div>

  <!-- Блок таймера -->
  <div id="timer-block">
    <div class="timer-label">Таймер</div>
    <div class="timer-btns">
      <button class="btn-timer" id="btn-t250">250 с</button>
      <button class="btn-timer" id="btn-t50">50 с</button>
      <button class="btn-timer-stop" id="btn-tstop">■ Стоп</button>
    </div>
    <div id="timer-display">—</div>
    <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
  </div>

  <div id="scoring-section" style="display:none">
    <div id="scoring-wrap">
      <table id="scoring-table">
        <thead>
          <tr id="scoring-head"></tr>
        </thead>
        <tbody id="scoring-body"></tbody>
      </table>
    </div>
    <div id="save-status"></div>

    <hr style="border:none; border-top:1px solid #ddd; margin: 28px 0 20px;">
    <h3 style="font-size:0.85rem; color:#888; letter-spacing:2px; text-transform:uppercase; margin-bottom:12px">Рейтинг</h3>
    <table id="ranking-table" style="border-collapse:collapse; font-size:0.9rem; width:100%; max-width:460px;">
      <thead>
        <tr style="color:#aaa; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px;">
          <th style="padding:4px 12px 8px 0; text-align:left; width:28px">#</th>
          <th id="th-ranking-name" style="padding:4px 12px 8px 0; text-align:left">Пара</th>
          <th style="padding:4px 0 8px; text-align:right">Итого</th>
        </tr>
      </thead>
      <tbody id="ranking-body"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../config.js"></script>
<script>
// ─── Конфиг ────────────────────────────────────────────────
const SUPABASE_URL      = window.MUSHKETON_CONFIG.SUPABASE_URL;
const SUPABASE_ANON_KEY = window.MUSHKETON_CONFIG.SUPABASE_ANON_KEY;
// ───────────────────────────────────────────────────────────

const { createClient } = supabase;

// ── Токен из URL ─────────────────────────────────────────
const token = new URLSearchParams(location.search).get('token');

// Токен может отсутствовать — страница открывается, но все запросы к БД
// будут отклонены Supabase RLS без валидного токена.

const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  global: { headers: { 'x-judge-token': token } }
});

let competition = null;
let shooters    = [];

// ── Инициализация ─────────────────────────────────────────
async function init() {
  const loading = document.getElementById('loading');
  const errBox  = document.getElementById('error-box');
  loading.style.display = 'block';

  const { data: comps, error } = await db
    .from('competitions')
    .select('*')
    .eq('is_active', true)
    .order('date', { ascending: false })
    .limit(1);

  loading.style.display = 'none';

  if (error) {
    errBox.textContent = 'Ошибка подключения к базе данных: ' + error.message;
    errBox.style.display = 'block';
    return;
  }

  document.getElementById('btn-new').style.display = 'block';

  if (!comps || comps.length === 0) {
    document.getElementById('no-competition').style.display = 'block';
    return;
  }

  competition = comps[0];
  await loadShooters();
}

async function loadShooters() {
  const { data, error } = await db
    .from('shooters')
    .select('*')
    .eq('competition_id', competition.id)
    .order('target');

  if (error) {
    showStatus('Ошибка загрузки: ' + error.message, 'error');
    return;
  }

  shooters = data || [];

  const d = new Date(competition.date + 'T00:00:00');
  document.getElementById('comp-info').textContent =
    d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });

  document.getElementById('no-competition').style.display  = 'none';
  document.getElementById('scoring-section').style.display = 'block';
  document.getElementById('timer-block').style.display     = 'block';

  renderScoring();
  renderRanking();
  updateRankingHeader();
  loadTimerState();
  subscribeCompetitionUpdates();
}

function updateRankingHeader() {
  const th = document.getElementById('th-ranking-name');
  if (th) th.textContent = competition?.type === 'final' ? 'Имя' : 'Пара';
}

// Заголовки серий: количество выстрелов в каждой серии/раунде
// зависит от типа соревнования — вычитывается каждый раз

function seriesLabels() {
  return competition?.type === 'final'
    ? ['5','5','2','2','2','2','2','2','2']
    : ['5','5','5','3','3','3'];
}
function seriesCount() { return seriesLabels().length; }

// ── Таблица результатов ───────────────────────────────────
// Пары: щит 1+2, щит 3+4, щит 5+6 ... до щит 19+20
// Финал: 1 стрелок = 1 строка, без группировки/разделителей
function renderScoring() {
  const isFinal = competition?.type === 'final';
  const labels  = seriesLabels();
  const count   = seriesCount();

  const head = document.getElementById('scoring-head');
  head.innerHTML =
    '<th class="left" style="width:52px">Щит</th>' +
    '<th class="left">Фамилия</th>';
  labels.forEach(label => head.innerHTML += `<th>${label}</th>`);
  head.innerHTML += '<th>Σ</th>';

  const sorted = [...shooters].sort((a, b) => a.target - b.target);
  const tbody  = document.getElementById('scoring-body');
  tbody.innerHTML = '';

  sorted.forEach((shooter, idx) => {
    // Разделитель перед нечётным щитом (кроме первого) — только для пар
    if (!isFinal && idx > 0 && shooter.target % 2 === 1) {
      const sep = tbody.insertRow();
      sep.className = 'pair-sep';
      sep.insertCell().colSpan = 2 + count + 1;
    }

    const tr = tbody.insertRow();
    tr.dataset.id = shooter.id;

    const tdT = tr.insertCell();
    tdT.className = 'td-target';
    tdT.innerHTML = `<span>${shooter.target}</span>`;

    const tdN = tr.insertCell();
    tdN.className = 'td-name';
    tdN.innerHTML = `<span>${esc(shooter.name)}</span>`;

    for (let i = 1; i <= count; i++) {
      const key = 's' + i;
      const val = shooter[key];
      const td  = tr.insertCell();
      td.className = 'cell-series';
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.inputMode = 'decimal';
      inp.dataset.id  = shooter.id;
      inp.dataset.key = key;
      inp.value = val != null ? val : '';
      if (val != null) inp.classList.add('saved');
      inp.addEventListener('focus',   onFocus);
      inp.addEventListener('blur',    onBlur);
      inp.addEventListener('input',   onInput);
      inp.addEventListener('keydown', onKeyDown);
      td.appendChild(inp);
    }

    const tdTotal = tr.insertCell();
    tdTotal.className = 'td-total';
    tdTotal.id = 'total-' + shooter.id;
    tdTotal.innerHTML = `<span>${calcTotal(shooter) || '—'}</span>`;
  });
}

function sumSeries(shooter, count) {
  let sum = 0, any = false;
  for (let i = 1; i <= count; i++) {
    const v = shooter['s' + i];
    if (v != null) { sum += parseFloat(v); any = true; }
  }
  return any ? Math.round(sum * 10) / 10 : null;
}

function calcTotal(s) {
  const total = sumSeries(s, seriesCount());
  return total != null ? total.toFixed(1) : null;
}

// ── Ячейки ────────────────────────────────────────────────
function onFocus() {}
function onInput(e) { e.target.classList.add('unsaved'); }

async function onBlur(e) {
  const inp = e.target;
  const raw = inp.value.trim().replace(',', '.');
  const id  = inp.dataset.id;
  const key = inp.dataset.key;

  const val = raw === '' ? null : parseFloat(raw);
  if (raw !== '' && isNaN(val)) { inp.value = ''; inp.classList.remove('unsaved'); return; }

  inp.value = val != null ? val : '';
  await saveCell(id, key, val);
  inp.classList.remove('unsaved');
}

async function saveCell(id, key, value) {
  showStatus('Сохранение...', 'saving');
  // .select() возвращает реально обновлённые строки. Без валидного
  // токена RLS отсекает строку — вернётся пустой массив без error.
  const { data, error } = await db.from('shooters').update({ [key]: value }).eq('id', id).select();
  if (error) { showStatus('Ошибка: ' + error.message, 'error'); return; }
  if (!data || data.length === 0) {
    showStatus('Не сохранено — нет прав (проверьте ссылку с токеном)', 'error');
    return;
  }

  const s = shooters.find(x => x.id === id);
  if (s) {
    s[key] = value;
    const el = document.getElementById('total-' + id);
    if (el) el.innerHTML = `<span>${calcTotal(s) || '—'}</span>`;
  }
  renderRanking();
  showStatus('Сохранено ✓', 'ok');
  setTimeout(() => showStatus('', ''), 1500);
}

// ── Рейтинг (одни данные shooters, без дублирования) ────────────
function buildRanking() {
  const count = seriesCount();

  if (competition?.type === 'final') {
    return shooters
      .map(s => ({
        names: s.name,
        total: sumSeries(s, count) ?? 0
      }))
      .sort((a, b) => b.total - a.total);
  }

  const byPair = {};
  for (const s of shooters) {
    const idx = Math.floor((s.target - 1) / 2);
    if (!byPair[idx]) byPair[idx] = [];
    byPair[idx].push(s);
  }
  return Object.values(byPair)
    .map(members => {
      members.sort((a, b) => a.target - b.target);
      const total = members.reduce((sum, m) => sum + (sumSeries(m, count) ?? 0), 0);
      const names = members.map(m => m.name).join(' / ');
      return {
        names,
        total: Math.round(total * 10) / 10
      };
    })
    .sort((a, b) => b.total - a.total);
}

function renderRanking() {
  const pairs = buildRanking();
  const tbody = document.getElementById('ranking-body');
  if (!tbody) return;
  tbody.innerHTML = pairs.map((p, i) => `
    <tr style="border-top:1px solid #f0f0f0">
      <td style="padding:8px 12px 8px 0; color:#aaa">${i + 1}</td>
      <td style="padding:8px 12px 8px 0; font-weight:${i === 0 ? '700' : '400'}">${esc(p.names)}</td>
      <td style="padding:8px 0; text-align:right; font-weight:700">${p.total > 0 ? p.total.toFixed(1) : '—'}</td>
    </tr>
  `).join('');
}

// ── Навигация ─────────────────────────────────────────────
// ── Таймер ───────────────────────────────────────────────
let timerTick = null; // ID текущего setInterval

// Загрузить состояние таймера из текущего соревнования
function loadTimerState() {
  if (!competition) return;
  applyTimerState(competition);
}

// Применить состояние таймера из объекта competition
function applyTimerState(comp) {
  stopTimerTick(); // остановить старый tick перед перезапуском
  if (comp.timer_active && comp.timer_started_at && comp.timer_duration) {
    startTimerTick(new Date(comp.timer_started_at), comp.timer_duration);
  } else {
    renderTimerDisplay(null, null, false);
  }
  syncTimerButtons(comp);
}

// Запустить таймер в БД и локально
async function startTimer(duration) {
  const now = new Date().toISOString();
  const { data, error } = await db
    .from('competitions')
    .update({
      timer_started_at: now,
      timer_duration: duration,
      timer_active: true
    })
    .eq('id', competition.id)
    .select()
    .single();
  if (error) { showStatus('Ошибка таймера: ' + error.message, 'error'); return; }
  competition = data;
  applyTimerState(competition);
}

// Остановить и сбросить таймер в БД (для всех клиентов)
async function stopTimer() {
  const { data, error } = await db
    .from('competitions')
    .update({ timer_active: false, timer_started_at: null, timer_duration: null })
    .eq('id', competition.id)
    .select()
    .single();
  if (error) { showStatus('Ошибка стопа: ' + error.message, 'error'); return; }
  competition = data;
  stopTimerTick();
  renderTimerDisplay(null, null, false);
  syncTimerButtons(competition);
}

// Локальный tick: пересчитывает остаток каждую секунду
function startTimerTick(startedAt, duration) {
  function tick() {
    const elapsed  = (Date.now() - startedAt) / 1000;
    const remaining = Math.max(0, duration - elapsed);
    renderTimerDisplay(remaining, duration, true);
    if (remaining <= 0) stopTimerTick();
  }
  tick();
  timerTick = setInterval(tick, 500);
}

function stopTimerTick() {
  if (timerTick) { clearInterval(timerTick); timerTick = null; }
}

// Отрисовать дисплей таймера
function renderTimerDisplay(remaining, duration, running) {
  const disp = document.getElementById('timer-display');
  const bar  = document.getElementById('timer-bar');
  if (remaining === null) {
    disp.textContent = '—';
    disp.className   = '';
    bar.style.width  = '100%';
    bar.className    = 'timer-bar';
    return;
  }
  const secs  = Math.ceil(remaining);
  const m     = Math.floor(secs / 60);
  const s     = secs % 60;
  disp.textContent = m + ':' + String(s).padStart(2, '0');
  const pct   = duration > 0 ? (remaining / duration) * 100 : 0;
  bar.style.width = pct.toFixed(1) + '%';
  const done  = remaining <= 0;
  disp.className   = done ? 'finished' : '';
  bar.className    = (pct < 20 || done) ? 'finishing' : '';
}

// Синхронизация кнопок (подсвечивает активную)
function syncTimerButtons(comp) {
  document.getElementById('btn-t250').classList
    .toggle('active', !!(comp.timer_active && comp.timer_duration === 250));
  document.getElementById('btn-t50').classList
    .toggle('active', !!(comp.timer_active && comp.timer_duration === 50));
}

// Подписка на UPDATE competitions (синхронизация между вкладками)
function subscribeCompetitionUpdates() {
  if (!competition) return;
  db.channel('judge-comp-' + competition.id)
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'competitions',
      filter: `id=eq.${competition.id}`
    }, ({ new: updated }) => {
      competition = { ...competition, ...updated };
      applyTimerState(competition);
    })
    .subscribe();
}

// Кнопки таймера
document.getElementById('btn-t250').addEventListener('click', () => startTimer(250));
document.getElementById('btn-t50').addEventListener('click',  () => startTimer(50));
document.getElementById('btn-tstop').addEventListener('click', stopTimer);

// ── Навигация ─────────────────────────────────────────

function onKeyDown(e) {
  if (e.key === 'Enter') {
    e.preventDefault(); moveFocusEnter(e.target); // Enter ↓, в конце столбца → следующий столбец
  } else if (e.key === 'Tab' && !e.shiftKey) {
    e.preventDefault(); moveFocus(e.target, +1);          // Tab → следующая колонка
  } else if (e.key === 'Tab' && e.shiftKey) {
    e.preventDefault(); moveFocus(e.target, -1);          // Shift+Tab ←
  } else if (e.key === 'ArrowDown')  { e.preventDefault(); moveFocusVertical(e.target, +1); }
    else if (e.key === 'ArrowUp')    { e.preventDefault(); moveFocusVertical(e.target, -1); }
    else if (e.key === 'ArrowRight') { moveFocus(e.target, +1); }
    else if (e.key === 'ArrowLeft')  { moveFocus(e.target, -1); }
}

function allInputs() {
  return [...document.querySelectorAll('#scoring-body input[data-key]')];
}

function moveFocus(inp, d) {
  const list = allInputs(), i = list.indexOf(inp);
  const next = list[i + d];
  if (next) { inp.blur(); next.focus(); next.select(); }
}

function moveFocusVertical(inp, d) {
  const key  = inp.dataset.key;
  const col  = allInputs().filter(x => x.dataset.key === key);
  const i    = col.indexOf(inp);
  const next = col[i + d];
  if (next) { inp.blur(); next.focus(); next.select(); }
}

// Enter: вниз по столбцу; на последней строке столбца → первая строка следующего
// столбца; в самой последней ячейке (последний столбец, последняя строка) —
// сохранить значение и остаться на месте.
function moveFocusEnter(inp) {
  const key  = inp.dataset.key;
  const col  = allInputs().filter(x => x.dataset.key === key);
  const i    = col.indexOf(inp);
  const next = col[i + 1];
  if (next) { inp.blur(); next.focus(); next.select(); return; }

  const n     = parseInt(key.slice(1), 10);
  const nextKey = n < seriesCount() ? 's' + (n + 1) : null;
  const nextCol = nextKey ? allInputs().filter(x => x.dataset.key === nextKey) : [];
  if (nextCol[0]) { inp.blur(); nextCol[0].focus(); nextCol[0].select(); return; }

  inp.blur(); inp.focus(); inp.select(); // последняя ячейка — сохранить и остаться
}

function showStatus(msg, cls) {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  el.className = cls;
}

// ── Модал: ввод участников ────────────────────────────────
// Пары: 4 пары = 8 щитов, разделители через 2 строки.
// Финал: 8 стрелков без разделителей, без слова «Пара».
let selectedType = 'final';

function openSetupModal() {
  selectedType = 'final';
  syncTypeTabs();
  renderSetupRows();
  document.getElementById('modal-overlay').classList.add('visible');
  document.getElementById('setup-body').querySelector('input[data-col="name"]').focus();
}

function syncTypeTabs() {
  document.getElementById('tab-pairs').classList.toggle('active', selectedType === 'pairs');
  document.getElementById('tab-final').classList.toggle('active', selectedType === 'final');
}

function renderSetupRows() {
  const tbody = document.getElementById('setup-body');
  tbody.innerHTML = '';
  for (let i = 0; i < 8; i++) addSetupRow(i);
}

function addSetupRow(idx) {
  const tbody     = document.getElementById('setup-body');
  const targetNum = idx + 1;

  // Разделитель между парами — только для типа «pairs»
  if (selectedType === 'pairs' && idx > 0 && idx % 2 === 0) {
    const sep = tbody.insertRow();
    sep.className = 'sep';
    sep.insertCell().colSpan = 2;
  }

  const tr = tbody.insertRow();

  const tdTarget = tr.insertCell();
  tdTarget.className = 'target-cell';
  tdTarget.textContent = targetNum;

  const tdName = tr.insertCell();
  const inp    = document.createElement('input');
  inp.type = 'text';
  inp.placeholder = 'фамилия';
  inp.dataset.col    = 'name';
  inp.dataset.row    = String(idx);
  inp.dataset.target = String(targetNum);
  tdName.appendChild(inp);

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const next = tbody.querySelector(`input[data-row="${idx + 1}"]`);
      if (next) next.focus();
    }
  });
}

document.getElementById('tab-pairs').addEventListener('click', () => {
  selectedType = 'pairs';
  syncTypeTabs();
  renderSetupRows();
});
document.getElementById('tab-final').addEventListener('click', () => {
  selectedType = 'final';
  syncTypeTabs();
  renderSetupRows();
});

document.getElementById('btn-new').addEventListener('click', openSetupModal);
document.getElementById('btn-new2').addEventListener('click', openSetupModal);
document.getElementById('btn-cancel-setup').addEventListener('click', () =>
  document.getElementById('modal-overlay').classList.remove('visible'));

document.getElementById('btn-start').addEventListener('click', async () => {
  const inputs  = document.querySelectorAll('#setup-body input[data-col="name"]');
  const entries = [];
  inputs.forEach(inp => {
    const n = inp.value.trim();
    if (n) entries.push({ target: parseInt(inp.dataset.target), name: n });
  });

  if (entries.length < 2) { alert('Введите хотя бы двух участников'); return; }

  const btn = document.getElementById('btn-start');
  btn.disabled = true; btn.textContent = 'Создаём...';

  await db.from('competitions').update({ is_active: false }).eq('is_active', true);

  const { data: comp, error: ce } = await db
    .from('competitions')
    .insert({ date: new Date().toISOString().slice(0, 10), is_active: true, type: selectedType })
    .select().single();

  if (ce) { alert('Ошибка: ' + ce.message); btn.disabled = false; btn.textContent = 'Старт →'; return; }

  competition = comp;

  const toInsert = entries.map(e => ({
    competition_id: comp.id,
    target:   e.target,
    name:     e.name,
    position: 1
  }));

  const { error: se } = await db.from('shooters').insert(toInsert);
  if (se) { alert('Ошибка: ' + se.message); btn.disabled = false; btn.textContent = 'Старт →'; return; }

  document.getElementById('modal-overlay').classList.remove('visible');
  btn.disabled = false; btn.textContent = 'Старт →';
  await loadShooters();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape')
    document.getElementById('modal-overlay').classList.remove('visible');
});

function esc(str) {
  return str.replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

init();
</script>
